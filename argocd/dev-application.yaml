apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-manager-dev
  namespace: argocd
  labels:
    environment: dev
  finalizers:
  - resources-finalizer.argocd.argoproj.io   # clean up resources when app deleted
spec:
  project: default

  # Source — where to read manifests from
  source:
    repoURL: https://github.com/tkrmandar/devops-k8s-manifests.git
    targetRevision: HEAD        # always track latest commit on main
    path: dev                   # only watch the dev/ folder

  # Destination — where to deploy
  destination:
    server: https://kubernetes.default.svc   # local minikube cluster
    namespace: dev

  # Sync policy — how ArgoCD should behave
  syncPolicy:
    automated:
      prune: true       # delete resources removed from git
      selfHeal: true    # auto fix if someone manually changes cluster
    syncOptions:
    - CreateNamespace=true      # create namespace if not exists
    - PrunePropagationPolicy=foreground
    retry:
      limit: 3          # retry 3 times if sync fails
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
