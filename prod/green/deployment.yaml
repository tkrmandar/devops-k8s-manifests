apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager-api-green
  namespace: prod
  labels:
    app: task-manager-api
    environment: prod
    slot: green
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-manager-api
      slot: green
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: task-manager-api
        environment: prod
        slot: green
        version: "1.0.0"
    spec:
      containers:
      - name: task-manager-api
        image: mterkhedkar/task-manager-api:latest
        imagePullPolicy: Always
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
      restartPolicy: Always
