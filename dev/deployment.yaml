apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager-api
  namespace: dev
  labels:
    app: task-manager-api
    environment: dev
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-manager-api
      environment: dev
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: task-manager-api
        environment: dev
        version: "1.0.0"
    spec:
      containers:
      - name: task-manager-api
        image: mterkhedkar/task-manager-api:c81e353e274893f72e89f5d1572f6ce706032b99
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "development"
        - name: PORT
          value: "3000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
      restartPolicy: Always
