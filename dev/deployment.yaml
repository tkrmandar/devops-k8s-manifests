apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager-api
  namespace: dev
  labels:
    app: task-manager-api
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-manager-api
      environment: dev
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: task-manager-api
        environment: dev
    spec:
      containers:
      - name: task-manager-api
        image: YOUR_DOCKERHUB_USERNAME/task-manager-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "development"
        - name: PORT
          value: "3000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        securityContext:
          runAsNonRoot: true        # ← Kyverno requires this
          runAsUser: 1000
          allowPrivilegeEscalation: false
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3